app:
  base-url: ${APP_BASE_URL:http://localhost:8081}

server:
  port: 8081

spring:
  application:
    name: sandbox-agent
  profiles:
    active: agnes

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/sandbox_agent?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

agent:
  mcp:
    # 是否启用真 MCP 协议客户端（基于官方 mcp-core SDK），当前项目默认开启
    enabled: ${MCP_ENABLED:true}
    # 单次 MCP 请求超时
    request-timeout: ${MCP_REQUEST_TIMEOUT:60s}
    # initialize 握手超时
    initialization-timeout: ${MCP_INIT_TIMEOUT:30s}
    # 单个用户最多允许配置的远程 MCP Server 数量
    max-user-servers: ${MCP_MAX_USER_SERVERS:10}
    # 用户动态 MCP 默认只允许 HTTPS；本地开发确有需要时可显式开启
    user-allow-http: ${MCP_USER_ALLOW_HTTP:false}
    # 默认禁止用户动态 MCP 访问环回、私网和链路本地地址，降低 SSRF 风险
    user-allow-private-network: ${MCP_USER_ALLOW_PRIVATE_NETWORK:false}
    # MCP Server 列表，系统级支持 stdio 和 streamable-http；用户动态配置额外支持 shell
    # 示例：
    #   servers:
    #     - id: filesystem
    #       type: stdio
    #       command: npx
    #       args: ["-y", "@modelcontextprotocol/server-filesystem", "D:/workspace"]
    #     - id: sandbox-filesystem
    #       type: shell
    #       command: npx
    #       args: ["-y", "@modelcontextprotocol/server-filesystem", "/home/gem"]
    #     - id: github
    #       type: streamable-http
    #       url: https://example.com/mcp
    #       headers:
    #         Authorization: "Bearer xxx"
    servers: []
  search:
    max-results: ${SEARCH_MAX_RESULTS:5}
    timeout: ${SEARCH_TIMEOUT:10s}
    proxy:
      host: ${SEARCH_PROXY_HOST:127.0.0.1}
      port: ${SEARCH_PROXY_PORT:7890}
    baidu:
      api-key: ${BAIDU_SEARCH_API_KEY:}
      timeout: ${BAIDU_SEARCH_TIMEOUT:15s}
      max-results: ${BAIDU_SEARCH_MAX_RESULTS:5}
  sub-agent:
    # 是否启用子代理功能（run_subagent 工具），默认关闭
    enabled: ${SUB_AGENT_ENABLED:true}
    # 单个子代理超时（秒）
    timeout-seconds: ${SUB_AGENT_TIMEOUT:120}
    types:
      analyzer:
        enabled: true
        max-iterations: 10
      searcher:
        enabled: true
        max-iterations: 5
      browser:
        enabled: true
        max-iterations: 10
      general:
        enabled: true
        max-iterations: 15
  background:
    max-concurrent: ${BG_MAX_CONCURRENT:5}
  sandbox:
    domain: ${SANDBOX_DOMAIN:localhost:8080}
    image: ${SANDBOX_IMAGE:agent-infra/sandbox-office:latest}
    timeout: PT30M
    ready-timeout: PT180S
    sandbox-timeout: ${SANDBOX_TIMEOUT:P1D}
  storage:
    type: ${STORAGE_TYPE:local}
    local:
      base-path: ${STORAGE_LOCAL_PATH:./uploads}
    oss:
      endpoint: ${OSS_ENDPOINT:}
      bucket: ${OSS_BUCKET:}
      access-key: ${OSS_ACCESS_KEY:}
      secret-key: ${OSS_SECRET_KEY:}
  skill:
    directory: ${SKILL_DIR:.claude/skills}
  llm:
    planner:
      api-url: ${PLANNER_LLM_URL:https://open.bigmodel.cn/api/paas/v4}
      api-key: ${PLANNER_LLM_KEY:}
      model: ${PLANNER_LLM_MODEL:glm-4.7}

rag:
  preview:
    conversion:
      enabled: ${RAG_PREVIEW_CONVERSION_ENABLED:true}
      timeout-seconds: ${RAG_PREVIEW_CONVERSION_TIMEOUT_SECONDS:120}
  embedding:
    api-url: ${RAG_EMBEDDING_URL:https://open.bigmodel.cn/api/paas/v4/embeddings}
    api-key: ${RAG_EMBEDDING_KEY:}
    model: ${RAG_EMBEDDING_MODEL:embedding-3}
    dimension: 2048
    batch-size: 25
  chunk:
    size: 500
    overlap: 50
  milvus:
    host: ${MILVUS_HOST:localhost}
    port: ${MILVUS_PORT:19530}
    collection: knowledge_chunks_v3
  storage:
    path: ${RAG_STORAGE_PATH:./uploads/knowledge}
  enhancement:
    enabled: true
    rewrite:
      enabled: true
      max-queries: 3
      api-url: ${RAG_REWRITE_URL:http://localhost:11434/api/chat}
      model: ${RAG_REWRITE_MODEL:qwen3:1.7b}
      temperature: 0.1
      top-p: 0.8
      num-predict: 128
      num-ctx: 4096
      keep-alive: 30m
    retrieve:
      top-n: 20
      min-score: 0.5
    rerank:
      enabled: true
      api-url: ${RAG_RERANK_URL:http://127.0.0.1:8002/rerank}
      top-k: 8

baidu:
  ocr:
    ak: ${BAIDU_OCR_AK:}
    sk: ${BAIDU_OCR_SK:}

logging:
  level:
    com.example.sandbox: DEBUG

---
spring:
  config:
    activate:
      on-profile: agnes
agent:
  llm:
    executor:
      api-url: https://apihub.agnes-ai.com/v1
      api-key: ${AGNES_API_KEY:}
      model: agnes-2.0-flash

---
spring:
  config:
    activate:
      on-profile: deepseek
agent:
  llm:
    executor:
      api-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:}
      model: deepseek-v4-flash
      thinking-enabled: false
