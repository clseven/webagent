app:
  base-url: ${APP_BASE_URL:http://localhost:8081}

server:
  port: 8081

spring:
  application:
    name: sandbox-agent
  profiles:
    active: deepseek,local

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/sandbox_agent?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

agent:
  # 智能体解释“今天、明天”等相对时间时使用的默认 IANA 时区
  time-zone: ${AGENT_TIME_ZONE:Asia/Shanghai}
  context:
    # 持久化会话摘要和最近完整工具协议，不再按固定消息条数裁剪
    enabled: ${AGENT_CONTEXT_ENABLED:true}
    summarize-threshold-tokens: ${AGENT_CONTEXT_SUMMARIZE_THRESHOLD_TOKENS:512000}
    compact-target-tokens: ${AGENT_CONTEXT_COMPACT_TARGET_TOKENS:320000}
    recent-tool-result-tokens: ${AGENT_CONTEXT_RECENT_TOOL_RESULT_TOKENS:192000}
    max-tool-result-chars: ${AGENT_CONTEXT_MAX_TOOL_RESULT_CHARS:200000}
    tool-result-preview-chars: ${AGENT_CONTEXT_TOOL_RESULT_PREVIEW_CHARS:2000}
    chars-per-token: ${AGENT_CONTEXT_CHARS_PER_TOKEN:1.5}
    token-safety-ratio: ${AGENT_CONTEXT_TOKEN_SAFETY_RATIO:1.1}
  mcp:
    # 是否启用真 MCP 协议客户端（基于官方 mcp-core SDK），当前项目默认开启
    enabled: ${MCP_ENABLED:true}
    # 单次 MCP 请求超时
    request-timeout: ${MCP_REQUEST_TIMEOUT:60s}
    # initialize 握手超时
    initialization-timeout: ${MCP_INIT_TIMEOUT:30s}
    # 单个用户最多允许配置的远程 MCP Server 数量
    max-user-servers: ${MCP_MAX_USER_SERVERS:10}
    # 用户动态 MCP 默认只允许 HTTPS；本地开发确有需要时可显式开启
    user-allow-http: ${MCP_USER_ALLOW_HTTP:false}
    # 默认禁止用户动态 MCP 访问环回、私网和链路本地地址，降低 SSRF 风险
    user-allow-private-network: ${MCP_USER_ALLOW_PRIVATE_NETWORK:false}
    # MCP Server 列表，系统级支持 stdio 和 streamable-http；用户动态配置额外支持 shell
    # 示例：
    #   servers:
    #     - id: filesystem
    #       type: stdio
    #       command: npx
    #       args: ["-y", "@modelcontextprotocol/server-filesystem", "D:/workspace"]
    #     - id: sandbox-filesystem
    #       type: shell
    #       command: npx
    #       args: ["-y", "@modelcontextprotocol/server-filesystem", "/home/gem"]
    #     - id: github
    #       type: streamable-http
    #       url: https://example.com/mcp
    #       headers:
    #         Authorization: "Bearer xxx"
    servers: []
  search:
    max-results: ${SEARCH_MAX_RESULTS:5}
    timeout: ${SEARCH_TIMEOUT:10s}
    proxy:
      host: ${SEARCH_PROXY_HOST:127.0.0.1}
      port: ${SEARCH_PROXY_PORT:7890}
    baidu:
      api-key: ${BAIDU_SEARCH_API_KEY:}
      timeout: ${BAIDU_SEARCH_TIMEOUT:15s}
      max-results: ${BAIDU_SEARCH_MAX_RESULTS:5}
  sub-agent:
    # 是否启用子代理功能（run_subagent 工具），默认关闭
    enabled: ${SUB_AGENT_ENABLED:true}
    # 单个子代理超时（秒）
    timeout-seconds: ${SUB_AGENT_TIMEOUT:120}
    types:
      analyzer:
        enabled: true
        max-iterations: 10
      searcher:
        enabled: true
        max-iterations: 5
      browser:
        enabled: true
        max-iterations: 10
      general:
        enabled: true
        max-iterations: 15
  background:
    max-concurrent: ${BG_MAX_CONCURRENT:5}
  sandbox:
    domain: ${SANDBOX_DOMAIN:localhost:8080}
    image: ${SANDBOX_IMAGE:agent-infra/sandbox-office:latest}
    timeout: PT30M
    ready-timeout: PT180S
    sandbox-timeout: ${SANDBOX_TIMEOUT:P1D}
  storage:
    type: ${STORAGE_TYPE:local}
    local:
      base-path: ${STORAGE_LOCAL_PATH:./uploads}
    oss:
      endpoint: ${OSS_ENDPOINT:}
      bucket: ${OSS_BUCKET:}
      access-key: ${OSS_ACCESS_KEY:}
      secret-key: ${OSS_SECRET_KEY:}
  skill:
    directory: ${SKILL_DIR:.claude/skills}
  llm:
    planner:
      api-url: ${DEEPSEEK_LLM_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY:}
      model: ${DEEPSEEK_LLM_MODEL:deepseek-v4-pro}
    executor:
      api-url: ${DEEPSEEK_LLM_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY:}
      model: ${DEEPSEEK_LLM_MODEL:deepseek-v4-pro}
      thinking-enabled: ${DEEPSEEK_THINKING_ENABLED:true}
    vision:
      api-url: ${AGNES_LLM_URL:https://apihub.agnes-ai.com/v1}
      api-key: ${AGNES_API_KEY:}
      model: ${AGNES_LLM_MODEL:agnes-2.0-flash}

rag:
  preview:
    conversion:
      enabled: ${RAG_PREVIEW_CONVERSION_ENABLED:true}
      timeout-seconds: ${RAG_PREVIEW_CONVERSION_TIMEOUT_SECONDS:120}
  embedding:
    api-url: ${RAG_EMBEDDING_URL:https://open.bigmodel.cn/api/paas/v4/embeddings}
    api-key: ${RAG_EMBEDDING_KEY:}
    model: ${RAG_EMBEDDING_MODEL:embedding-3}
    dimension: 2048
    batch-size: 25
  chunk:
    size: 500
    overlap: 50
  milvus:
    enabled: ${RAG_MILVUS_ENABLED:false}
    host: ${MILVUS_HOST:localhost}
    port: ${MILVUS_PORT:19530}
    collection: knowledge_chunks_v3
  storage:
    path: ${RAG_STORAGE_PATH:./uploads/knowledge}
  enhancement:
    enabled: true
    rewrite:
      enabled: true
      max-queries: 5
      api-url: ${RAG_REWRITE_URL:${DEEPSEEK_LLM_URL:https://api.deepseek.com}}
      api-key: ${RAG_REWRITE_KEY:${DEEPSEEK_API_KEY:}}
      model: ${RAG_REWRITE_MODEL:${DEEPSEEK_LLM_MODEL:deepseek-v4-pro}}
      temperature: 0.3
      top-p: 0.8
      max-tokens: 512
    retrieve:
      top-n: 20
    rerank:
      enabled: ${RAG_RERANK_ENABLED:true}
      provider: ${RAG_RERANK_PROVIDER:deepseek}
      api-url: ${RAG_RERANK_API_URL:${DEEPSEEK_LLM_URL:https://api.deepseek.com}}
      api-key: ${RAG_RERANK_API_KEY:${DEEPSEEK_API_KEY:}}
      model: ${RAG_RERANK_MODEL:deepseek-v4-flash}
      top-k: ${RAG_RERANK_TOP_K:5}
      min-score: ${RAG_RERANK_MIN_SCORE:0.8}
      max-candidates: ${RAG_RERANK_MAX_CANDIDATES:12}
      max-content-chars: ${RAG_RERANK_MAX_CONTENT_CHARS:1200}
      timeout-seconds: ${RAG_RERANK_TIMEOUT_SECONDS:10}
      max-tokens: ${RAG_RERANK_MAX_TOKENS:512}

baidu:
  ocr:
    ak: ${BAIDU_OCR_AK:}
    sk: ${BAIDU_OCR_SK:}

logging:
  level:
    com.example.sandbox: DEBUG
